name: DaysUntil
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 jiejuefuyou. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
targets:
  DaysUntil:
    type: application
    platform: iOS
    sources:
      - path: DaysUntil
        excludes:
          - "Resources/StoreKitConfiguration.storekit"
    resources:
      - path: DaysUntil/Resources/Assets.xcassets
      - path: DaysUntil/Resources/PrivacyInfo.xcprivacy
      - path: DaysUntil/Resources/StoreKitConfiguration.storekit
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.daysuntil
        PRODUCT_NAME: DaysUntil
        INFOPLIST_KEY_CFBundleDisplayName: DaysUntil
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
  DaysUntilTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DaysUntilTests
    dependencies:
      - target: DaysUntil
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.daysuntil.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DaysUntil.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DaysUntil"
  DaysUntilUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DaysUntilUITests
    dependencies:
      - target: DaysUntil
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.daysuntil.uitests
        TEST_TARGET_NAME: DaysUntil
schemes:
  DaysUntil:
    build:
      targets:
        DaysUntil: all
        DaysUntilTests: [test]
        DaysUntilUITests: [test]
    test:
      config: Debug
      targets:
        - DaysUntilTests
        - DaysUntilUITests
    run:
      config: Debug
    archive:
      config: Release
